<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&amp;family=Inter:wght@200&amp;display=swap');
    </style>
  </defs>

  <!-- barra top sólida: y=122 -->
  <rect x="80" y="122" width="240" height="1" fill="white"/>

  <!-- NICOLÁS izq, ALLER der: y=128→137 -->
  <text x="80" y="136"
        font-family="'Inter', sans-serif"
        font-size="8" font-weight="200" fill="white" opacity="0.5"
        letter-spacing="2.5" text-anchor="start">NICOLÁS</text>
  <text x="320" y="136"
        font-family="'Inter', sans-serif"
        font-size="8" font-weight="200" fill="white" opacity="0.5"
        letter-spacing="2.5" text-anchor="end">ALLER</text>

  <!-- barra thin superior: y=142 -->
  <rect x="80" y="142" width="240" height="0.6" fill="white" opacity="0.2"/>

  <!-- N: centro x=143, baseline y=257 -->
  <text x="143" y="257"
        font-family="'Cormorant Garamond', 'Palatino Linotype', Georgia, serif"
        font-size="130" font-weight="300" fill="white"
        text-anchor="middle">N</text>

  <!-- separador vertical: x=200, y=165→235 -->
  <rect x="199.5" y="165" width="0.8" height="70" fill="white" opacity="0.3"/>

  <!-- A: centro x=256, baseline y=257 -->
  <text x="256" y="257"
        font-family="'Cormorant Garamond', 'Palatino Linotype', Georgia, serif"
        font-size="130" font-weight="300" fill="white"
        text-anchor="middle">A</text>

  <!-- barra thin inferior: y=257 -->
  <rect x="80" y="257" width="240" height="0.6" fill="white" opacity="0.2"/>

  <!-- DATA izq, ENGINEER der: y=262→271 -->
  <text x="80" y="270"
        font-family="'Inter', sans-serif"
        font-size="8" font-weight="200" fill="white" opacity="0.5"
        letter-spacing="2.5" text-anchor="start">DATA</text>
  <text x="320" y="270"
        font-family="'Inter', sans-serif"
        font-size="8" font-weight="200" fill="white" opacity="0.5"
        letter-spacing="2.5" text-anchor="end">ENGINEER</text>

  <!-- barra bottom sólida: y=277 -->
  <rect x="80" y="277" width="240" height="1" fill="white"/>

</svg>
